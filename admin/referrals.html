<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin – Giới thiệu & Referral</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        background: #0a0a0a;
        color: #fafafa;
        padding: 1rem;
      }
      h1 {
        font-size: 1.5rem;
      }
      h2 {
        font-size: 1.2rem;
        margin-top: 2rem;
      }
      a {
        color: #eab308;
      }
      .card {
        background: #141414;
        border: 1px solid #262626;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      input,
      select,
      textarea,
      button {
        padding: 0.5rem;
        border-radius: 4px;
        border: 1px solid #262626;
        background: #1a1a1a;
        color: #fafafa;
        font-size: 0.9rem;
      }
      button {
        cursor: pointer;
        background: #eab308;
        color: #0a0a0a;
        border: none;
        font-weight: 600;
      }
      button.secondary {
        background: #262626;
        color: #fafafa;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }
      th,
      td {
        padding: 0.5rem;
        text-align: left;
        border-bottom: 1px solid #262626;
      }
      .hidden {
        display: none;
      }
      .nav {
        margin-bottom: 1.5rem;
      }
      .nav a {
        margin-right: 1rem;
      }
      .form-row {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        margin-bottom: 0.75rem;
        flex-wrap: wrap;
      }
      .form-row label {
        min-width: 140px;
        font-size: 0.85rem;
        color: #888;
      }
      .msg {
        padding: 0.5rem;
        border-radius: 4px;
        margin-bottom: 0.5rem;
        font-size: 0.85rem;
      }
      .msg-ok {
        background: rgba(34, 197, 94, 0.15);
        color: #22c55e;
      }
      .msg-err {
        background: rgba(239, 68, 68, 0.15);
        color: #ef4444;
      }
      .toggle {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="nav">
      <a href="/admin/">← Trang chủ Admin</a> |
      <a href="/admin/affiliates.html">Đối tác</a> |
      <a href="/admin/referrals.html">Giới thiệu</a>
    </div>

    <h1>Cấu hình Giới thiệu & Referral</h1>
    <div id="msg"></div>

    <!-- Config Form -->
    <div class="card">
      <h2 style="margin-top: 0">Cài đặt chương trình</h2>
      <div class="form-row">
        <label>Loại giảm giá:</label>
        <select id="cfgType">
          <option value="percent">Phần trăm (%)</option>
          <option value="fixed">Số tiền cố định (đ)</option>
        </select>
      </div>
      <div class="form-row">
        <label>Giá trị giảm:</label>
        <input type="number" id="cfgValue" min="0" style="width: 120px" />
      </div>
      <div class="form-row">
        <label>Đơn hàng tối thiểu:</label>
        <input type="number" id="cfgMinOrder" min="0" style="width: 140px" />
        <span style="color: #888; font-size: 0.8rem">đ</span>
      </div>
      <div class="form-row">
        <label>Thưởng người giới thiệu:</label>
        <input type="number" id="cfgReward" min="0" style="width: 120px" />
        <span style="color: #888; font-size: 0.8rem">đ</span>
      </div>
      <div class="form-row">
        <label>Kích hoạt:</label>
        <div class="toggle">
          <input type="checkbox" id="cfgActive" />
          <span id="cfgActiveLabel" style="font-size: 0.85rem">—</span>
        </div>
      </div>
      <button type="button" onclick="saveConfig()">Lưu cấu hình</button>
    </div>

    <!-- Usage History -->
    <h2>Lịch sử sử dụng mã giới thiệu</h2>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Mã</th>
            <th>Người giới thiệu</th>
            <th>Người được GT</th>
            <th>Giảm giá</th>
            <th>Ngày</th>
          </tr>
        </thead>
        <tbody id="usageBody"></tbody>
      </table>
      <div id="usagePagination" style="margin-top: 0.75rem"></div>
    </div>

    <script>
      const API = window.location.origin;
      const KEY = "streetwear_admin_key";
      function getKey() {
        return sessionStorage.getItem(KEY);
      }
      function h() {
        return { "Content-Type": "application/json", "x-admin-key": getKey() };
      }
      function fmt(n) {
        return new Intl.NumberFormat("vi-VN").format(n) + "đ";
      }
      function showMsg(text, ok) {
        const el = document.getElementById("msg");
        el.innerHTML = `<div class="msg ${ok ? "msg-ok" : "msg-err"}">${text}</div>`;
        setTimeout(() => (el.innerHTML = ""), 4000);
      }

      // ── Config ──
      async function loadConfig() {
        const r = await fetch(`${API}/admin/referrals/config`, {
          headers: h(),
        });
        const c = await r.json();
        document.getElementById("cfgType").value = c.discountType || "percent";
        document.getElementById("cfgValue").value = c.discountValue || 0;
        document.getElementById("cfgMinOrder").value = c.minOrderAmount || 0;
        document.getElementById("cfgReward").value = c.referrerReward || 0;
        document.getElementById("cfgActive").checked = !!c.isActive;
        document.getElementById("cfgActiveLabel").textContent = c.isActive
          ? "Đang bật"
          : "Đang tắt";
      }

      document
        .getElementById("cfgActive")
        .addEventListener("change", function () {
          document.getElementById("cfgActiveLabel").textContent = this.checked
            ? "Đang bật"
            : "Đang tắt";
        });

      async function saveConfig() {
        const body = {
          discountType: document.getElementById("cfgType").value,
          discountValue: Number(document.getElementById("cfgValue").value),
          minOrderAmount: Number(document.getElementById("cfgMinOrder").value),
          referrerReward: Number(document.getElementById("cfgReward").value),
          isActive: document.getElementById("cfgActive").checked,
        };
        const r = await fetch(`${API}/admin/referrals/config`, {
          method: "PUT",
          headers: h(),
          body: JSON.stringify(body),
        });
        if (r.ok) showMsg("Đã lưu cấu hình!", true);
        else showMsg("Lỗi lưu cấu hình", false);
      }

      // ── Usage ──
      let usagePage = 1;
      async function loadUsage(page) {
        if (page) usagePage = page;
        const r = await fetch(
          `${API}/admin/referrals/usage?page=${usagePage}&limit=15`,
          { headers: h() },
        );
        const d = await r.json();
        document.getElementById("usageBody").innerHTML =
          d.items
            .map((u) => {
              const referrer = u.referrerUserId || {};
              const used = u.usedByUserId || {};
              return `<tr>
          <td>${u.referralCode}</td>
          <td>${referrer.fullName || "—"} (${referrer.email || ""})</td>
          <td>${used.fullName || "—"} (${used.email || ""})</td>
          <td>${u.discountType === "percent" ? u.discountAmount + "%" : fmt(u.discountAmount)}</td>
          <td>${new Date(u.createdAt).toLocaleDateString("vi-VN")}</td>
        </tr>`;
            })
            .join("") ||
          '<tr><td colspan="5" style="color:#888;text-align:center;">Chưa có dữ liệu</td></tr>';
        // Pagination
        if (d.totalPages > 1) {
          let html = "";
          if (d.page > 1)
            html += `<button class="secondary" onclick="loadUsage(${d.page - 1})">← Trước</button> `;
          html += `<span style="color:#888;font-size:0.8rem"> Trang ${d.page}/${d.totalPages} </span>`;
          if (d.page < d.totalPages)
            html += ` <button class="secondary" onclick="loadUsage(${d.page + 1})">Sau →</button>`;
          document.getElementById("usagePagination").innerHTML = html;
        }
      }

      // ── Init ──
      if (!getKey()) {
        window.location.href = "/admin/";
      } else {
        loadConfig();
        loadUsage();
      }
    </script>
  </body>
</html>
